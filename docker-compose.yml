services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: estate
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/estate
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - media:/app/media_files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A celery_app.celery worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/estate
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media:/app/media_files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A celery_app.celery beat --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/estate
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  pgdata:
  media:
